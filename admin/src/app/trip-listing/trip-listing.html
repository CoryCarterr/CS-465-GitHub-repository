<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Trip Listing</h2>
    <a routerLink="/add-trip" class="btn btn-primary">Add Trip</a>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let trip of trips">
      
      <app-trip-card [trip]="trip"></app-trip-card>

      <!-- ✅ ADD THIS -->
      <div class="mt-2 text-center">
        <a [routerLink]="['/edit-trip', trip._id]" class="btn btn-warning btn-sm">
          Edit
        </a>
      </div>

    </div>
  </div>
</div>
