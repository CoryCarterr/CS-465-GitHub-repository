<div class="container mt-4">
  <h2>Edit Trip</h2>

  <form>
    <div class="mb-3">
      <label class="form-label">Code</label>
      <input type="text" class="form-control" [(ngModel)]="trip.code" name="code">
    </div>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" [(ngModel)]="trip.name" name="name">
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input type="text" class="form-control" [(ngModel)]="trip.length" name="length">
    </div>

    <div class="mb-3">
      <label class="form-label">Start</label>
      <input type="date" class="form-control" [(ngModel)]="trip.start" name="start">
    </div>

    <div class="mb-3">
      <label class="form-label">Resort</label>
      <input type="text" class="form-control" [(ngModel)]="trip.resort" name="resort">
    </div>

    <div class="mb-3">
      <label class="form-label">Per Person</label>
      <input type="number" class="form-control" [(ngModel)]="trip.perPerson" name="perPerson">
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input type="text" class="form-control" [(ngModel)]="trip.image" name="image">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" [(ngModel)]="trip.description" name="description"></textarea>
    </div>

    <!-- ✅ UPDATED BUTTON -->
    <button 
      type="button" 
      class="btn btn-primary"
      (click)="onSave()">
      Save Changes
    </button>
  </form>
</div>
